# DSL Lite — Cisco IOS Bundle
#
# Quick start:
#   cd bundles/cisco/ios
#   databricks bundle validate -t dev
#   databricks bundle deploy -t dev
#   databricks bundle run cisco_ios_sdp -t dev

bundle:
  name: dsl_lite_cisco_ios

# ── Execution mode ─────────────────────────────────────────────────────────────
# Option 1: SDP — Lakeflow Spark Declarative Pipeline (recommended, serverless)
include:
  - resources/sdp.yml
#
# Option 2: SSS — Spark Structured Streaming, classic compute
# include:
#   - resources/sss.yml
# ─────────────────────────────────────────────────────────────────────────────

variables:

  # --- Workspace ---
  repo_path:
    description: >
      Absolute workspace path to the dsl_lite repository.
      Defaults to the current user's standard workspace path.
      Override for CI/CD service accounts or custom paths.
    default: "/Workspace/Users/${workspace.current_user.userName}/dsl_lite"

  # --- Catalogs ---
  bronze_catalog:
    description: "Catalog for Bronze tables. Leave empty to use database name only."
    default: ""

  silver_catalog:
    description: "Catalog for Silver tables. Leave empty to use database name only."
    default: ""

  gold_catalog:
    description: "Catalog for Gold (OCSF) tables."
    default: ""

  # --- Databases ---
  bronze_database:
    description: "Bronze schema for this pipeline."
    default: "cisco"

  silver_database:
    description: "Silver schema for this pipeline."
    default: "cisco"

  gold_database:
    description: "Gold (OCSF) schema."
    default: "ocsf"

  # --- SSS only ---
  sss_checkpoints_base:
    description: "Base Volume path for SSS checkpoints. Not used by SDP."
    default: "/Volumes/main/ocsf/checkpoints"

  spark_version:
    description: "DBR version for SSS classic job clusters."
    default: "16.4.x-scala2.12"

  node_type_id:
    description: "Worker instance type. AWS: i3.xlarge | Azure: Standard_D4ds_v5 | GCP: n2-highmem-4"
    default: "i3.xlarge"

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------

targets:

  dev:
    default: true
    mode: development
    workspace:
      host: ""
      profile: DEFAULT
    variables:
      # repo_path defaults to /Workspace/Users/<current-user>/dsl_lite
      # If your repo is under Repos: /Workspace/Repos/<current-user>/dsl_lite
      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog:   ""

  staging:
    mode: development
    workspace:
      host: ""
      profile: DEFAULT
    variables:
      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog:   ""

  prod:
    mode: production
    workspace:
      host: ""
      profile: DEFAULT
    variables:
      # repo_path: /Workspace/Users/svc-account@domain.com/dsl_lite
      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog:   ""
