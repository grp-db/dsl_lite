resources:
  jobs:
    aws_vpc_flowlogs_sss:
      name: "[${bundle.target}] DSL Lite - AWS VPC Flow Logs (SSS)"

      job_clusters:
        - job_cluster_key: pipeline_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id:  ${var.node_type_id}
            num_workers: 2

      tasks:

        - task_key: bronze
          description: "Ingest AWS VPC Flow Logs into the Bronze Delta table via Auto Loader."
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: "${workspace.file_path}/src/sss_bronze.py"
            base_parameters:
              preset_file:          "${workspace.file_path}/pipelines/aws/vpc_flowlogs/preset.yaml"
              bronze_database:      "${var.source_database}"
              checkpoints_location: "${var.sss_checkpoints_base}/aws_vpc_flowlogs"
              continuous:           "False"

        - task_key: silver
          description: "Parse and structure Bronze data into the Silver Delta table."
          depends_on:
            - task_key: bronze
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: "${workspace.file_path}/src/sss_silver.py"
            base_parameters:
              preset_file:          "${workspace.file_path}/pipelines/aws/vpc_flowlogs/preset.yaml"
              bronze_database:      "${var.source_database}"
              silver_database:      "${var.source_database}"
              checkpoints_location: "${var.sss_checkpoints_base}/aws_vpc_flowlogs"
              continuous:           "False"

        - task_key: gold
          description: "Map Silver data to OCSF-compliant Gold tables."
          depends_on:
            - task_key: silver
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: "${workspace.file_path}/src/sss_gold.py"
            base_parameters:
              preset_file:          "${workspace.file_path}/pipelines/aws/vpc_flowlogs/preset.yaml"
              silver_database:      "${var.source_database}"
              gold_database:        "${var.gold_database}"
              checkpoints_location: "${var.sss_checkpoints_base}/aws_vpc_flowlogs"
              continuous:           "False"

      permissions:
        - level: CAN_VIEW
          group_name: users
