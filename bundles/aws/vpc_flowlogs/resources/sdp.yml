resources:
  pipelines:
    aws_vpc_flowlogs_sdp:
      name: "[${bundle.target}] DSL Lite - AWS VPC Flow Logs (SDP)"

      libraries:
        - file:
            path: ${var.repo_path}/src/sdp_medallion.py

      configuration:
        dsl_lite.config_file:          "${var.repo_path}/pipelines/${var.source}/${var.source_type}/preset.yaml"
        dsl_lite.bronze_catalog_name:  "${var.bronze_catalog}"
        dsl_lite.bronze_database_name:  "${var.bronze_database}"
        dsl_lite.silver_catalog_name:  "${var.silver_catalog}"
        dsl_lite.silver_database_name:  "${var.silver_database}"
        dsl_lite.gold_catalog_name:    "${var.gold_catalog}"
        dsl_lite.gold_database_name:   "${var.gold_database}"
        dsl_lite.skip_bronze:          "false"
        dsl_lite.skip_silver:          "false"
        spark.databricks.delta.preview.enabled: "true"

      catalog:    ${var.gold_catalog}
      schema:     ${var.gold_database}
      serverless: true
      continuous: false

      event_log:
        catalog: ${var.bronze_catalog}
        schema:  ${var.bronze_database}
        name:    ${var.source}_${var.source_type}_event_log

      # ── Custom tags (optional) ────────────────────────────────────────────
      # tags:
      #   team:        security
      #   environment: ${bundle.target}
      #   source:      ${var.source}

      permissions:
        - level: CAN_VIEW
          group_name: users
