  # --- API Activity (6003): git.clone/fetch/push, pull_request, deploy, workflow.run, release ---
  - name: api_activity
    input: github_audit_logs_silver
    # catalog: my_catalog  # Optional: Unity Catalog catalog name
    # database: my_database  # Optional: database name (required if catalog is specified)
    filter: "action RLIKE 'git\\.(clone|fetch|push)|pull_request\\.|deploy\\.|workflow\\.run|release\\.'"
    fields:
      - name: time
        from: time
      - name: category_uid
        expr: CAST(6 AS INT)
      - name: category_name
        literal: Application Activity
      - name: class_uid
        expr: CAST(6003 AS INT)
      - name: class_name
        literal: API Activity
      - name: severity_id
        expr: CAST(1 AS INT)
      - name: severity
        literal: Informational
      - name: activity_id
        expr: |
          CASE
            WHEN action IN ('git.push', 'pull_request.create', 'release.create') THEN 1
            WHEN action IN ('git.clone', 'git.fetch') THEN 2
            WHEN action IN ('pull_request.merge', 'pull_request.close') THEN 3
            WHEN action LIKE 'deploy.%' THEN 5
            ELSE 99
          END
      - name: activity_name
        expr: |
          CASE
            WHEN action IN ('git.push', 'pull_request.create', 'release.create') THEN 'Create'
            WHEN action IN ('git.clone', 'git.fetch') THEN 'Read'
            WHEN action IN ('pull_request.merge', 'pull_request.close') THEN 'Update'
            WHEN action LIKE 'deploy.%' THEN 'Connect'
            ELSE 'Other'
          END
      - name: status_id
        expr: CAST(1 AS INT)
      - name: status
        literal: Success
      - name: action
        literal: Allowed
      - name: action_id
        expr: CAST(1 AS INT)
      - name: timezone_offset
        expr: CAST(NULL AS INT)
      - name: type_uid
        expr: CAST(600300 + activity_id AS BIGINT)
      - name: type_name
        expr: |
          CONCAT('API Activity: ', activity_name)
      - name: metadata.version
        literal: "1.7.0"
      - name: metadata.product.name
        literal: GitHub
      - name: metadata.product.vendor_name
        literal: "GitHub Inc."
      - name: metadata.uid
        from: event_id
