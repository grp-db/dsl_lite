        from: action
      - name: metadata.log_format
        literal: JSON
      - name: metadata.log_name
        literal: audit_logs
      - name: metadata.log_provider
        from: source
      - name: metadata.log_version
        literal: "github@audit_logs:version@1.0"
      - name: metadata.logged_time
        from: processed_time
      - name: metadata.original_time
        expr: CAST(created_at_ms AS STRING)
      - name: api.operation
        from: action
      - name: actor.user.uid
        from: actor
      - name: actor.user.name
        from: actor
      - name: actor.user.type
        literal: User
      - name: actor.user.type_id
        expr: CAST(1 AS INT)
      - name: src_endpoint.ip
        from: actor_ip
      - name: resources
        expr: |
          CASE
            WHEN repository IS NOT NULL THEN array(named_struct('name', repository, 'uid', repository, 'hostname', CAST(NULL AS STRING), 'ip', CAST(NULL AS STRING)))
            ELSE CAST(NULL AS ARRAY<STRUCT<name:STRING, uid:STRING, hostname:STRING, ip:STRING>>)
          END
      - name: cloud.provider
        literal: GitHub
      - name: cloud.account.uid
        from: organization
      - name: observables
        expr: |
          filter(array(
            CASE WHEN actor IS NOT NULL THEN named_struct('name', 'actor.user.name', 'type', 'User Name', 'value', actor) ELSE NULL END,
            CASE WHEN repository IS NOT NULL THEN named_struct('name', 'resources.uid', 'type', 'Resource UID', 'value', repository) ELSE NULL END
          ), x -> x IS NOT NULL)
      - name: enrichments
        expr: |
          array(
            named_struct('name', 'organization', 'value', organization, 'data', CAST(NULL AS VARIANT), 'desc', CAST(NULL AS STRING))
          )
      - name: raw_data
        expr: CAST(to_json(named_struct('payload', data, 'source', source, 'sourcetype', sourcetype)) AS VARIANT)
      - name: unmapped
        expr: |
          CAST(
            to_json(
              named_struct(
                'event_id', event_id,
                'action', action,
                'actor', actor,
                'organization', organization,
                'repository', repository,
                'ref', ref,
                'head', head,
