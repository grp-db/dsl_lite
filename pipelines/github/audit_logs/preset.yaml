      - name: metadata.log_format
        literal: JSON
      - name: metadata.log_name
        literal: audit_logs
      - name: metadata.log_provider
        from: source
      - name: metadata.log_version
        literal: "github@audit_logs:version@1.0"
      - name: metadata.logged_time
        from: processed_time
      - name: metadata.original_time
        expr: CAST(created_at_ms AS STRING)
      - name: actor.user.uid
        from: actor
      - name: actor.user.name
        from: actor
      - name: actor.user.type
        literal: User
      - name: actor.user.type_id
        expr: CAST(1 AS INT)
      - name: entity.uid
        from: repository
      - name: entity.name
        expr: SPLIT(repository, '/')[1]
      - name: entity.type
        literal: Repository
      - name: src_endpoint.ip
        from: actor_ip
      - name: src_endpoint.location.country
        from: actor_country
      - name: src_endpoint.location.city
        from: actor_city
      - name: cloud.provider
        literal: GitHub
      - name: cloud.account.uid
        from: organization
      - name: observables
        expr: |
          filter(array(
            CASE WHEN actor IS NOT NULL THEN named_struct('name', 'actor', 'type', 'User Name', 'value', actor) ELSE NULL END,
            CASE WHEN repository IS NOT NULL THEN named_struct('name', 'entity.uid', 'type', 'Resource UID', 'value', repository) ELSE NULL END
          ), x -> x IS NOT NULL)
      - name: enrichments
        expr: |
