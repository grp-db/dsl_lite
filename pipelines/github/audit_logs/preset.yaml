  # --- Entity Management (3004): repo.create/destroy/rename, org.rename ---
  - name: entity_management
    input: github_audit_logs_silver
    # catalog: my_catalog  # Optional: Unity Catalog catalog name
    # database: my_database  # Optional: database name (required if catalog is specified)
    filter: "action RLIKE 'repo\\.(create|destroy|rename|archived|access)|org\\.rename'"
    fields:
      - name: time
        from: time
      - name: category_uid
        expr: CAST(3 AS INT)
      - name: category_name
        literal: Identity & Access Management
      - name: class_uid
        expr: CAST(3004 AS INT)
      - name: class_name
        literal: Entity Management
      - name: severity_id
        expr: |
          CASE
            WHEN action LIKE '%destroy%' THEN 3
            WHEN action LIKE '%create%' THEN 2
            ELSE 1
          END
      - name: severity
        expr: |
          CASE
            WHEN action LIKE '%destroy%' THEN 'Medium'
            WHEN action LIKE '%create%' THEN 'Low'
            ELSE 'Informational'
          END
      - name: activity_id
        expr: |
          CASE
            WHEN action = 'repo.create' THEN 1
            WHEN action = 'repo.destroy' THEN 4
            WHEN action IN ('repo.rename', 'org.rename') THEN 3
            WHEN action = 'repo.archived' THEN 3
            WHEN action = 'repo.access' THEN 3
            ELSE 99
          END
      - name: activity_name
        expr: |
          CASE
            WHEN action = 'repo.create' THEN 'Create'
            WHEN action = 'repo.destroy' THEN 'Delete'
            WHEN action IN ('repo.rename', 'org.rename', 'repo.archived', 'repo.access') THEN 'Update'
            ELSE 'Other'
          END
      - name: status_id
        expr: CAST(1 AS INT)
      - name: status
        literal: Success
      - name: action
        literal: Allowed
      - name: action_id
        expr: CAST(1 AS INT)
      - name: timezone_offset
        expr: CAST(NULL AS INT)
      - name: type_uid
        expr: CAST(300400 + activity_id AS BIGINT)
      - name: type_name
        expr: |
          CONCAT('Entity Management: ', activity_name)
      - name: metadata.version
        literal: "1.7.0"
      - name: metadata.product.name
