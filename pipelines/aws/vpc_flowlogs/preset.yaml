# AWS VPC Flow Logs → OCSF Network Activity
# Format: space-delimited CSV with header row (AWS default delivery format).
# v3+/v4/v5 optional fields are extracted by name — any user-configured column
# layout is supported as long as the header row is present.
name: aws_vpc_flowlogs
title: "AWS VPC Flow Logs"
description: "AWS VPC Flow Logs (v2+) — space-delimited CSV with header"
author: "grp"

autoloader:
  inputs:
    - /Volumes/logs/logs/logs/dsl_grp/aws/vpc_flowlogs/
  format: csv
  cloudFiles:
    sep: " "
    header: "true"

bronze:
  name: aws_vpc_flowlogs_bronze
  clusterBy: [time]
  loadAsSingleVariant: true
  preTransform:
    -
      - CAST('aws' AS STRING) AS source
      - CAST('vpc_flowlogs' AS STRING) AS sourcetype
      - COALESCE(TRY_TO_TIMESTAMP(try_variant_get(data, '$.start', 'long')), TRY_TO_TIMESTAMP(try_variant_get(data, '$.end', 'long')), CURRENT_TIMESTAMP()) AS time
      - "data"

silver:
  transform:
    - name: aws_vpc_flowlogs_silver
      clusterBy: [time]
      filter: data is not null
      fields:
        # -------- v2 fields --------
        - name: version
          expr: try_variant_get(data, '$.version', 'int')
        - name: account_id
          expr: NULLIF(try_variant_get(data, '$.account-id', 'string'), '-')
        - name: interface_id
          expr: NULLIF(try_variant_get(data, '$.interface-id', 'string'), '-')
        - name: src_addr
          expr: NULLIF(try_variant_get(data, '$.srcaddr', 'string'), '-')
        - name: dst_addr
          expr: NULLIF(try_variant_get(data, '$.dstaddr', 'string'), '-')
        - name: src_port
          expr: try_variant_get(data, '$.srcport', 'int')
        - name: dst_port
          expr: try_variant_get(data, '$.dstport', 'int')
        - name: protocol
          expr: try_variant_get(data, '$.protocol', 'int')
        - name: packets
          expr: try_variant_get(data, '$.packets', 'long')
        - name: bytes
          expr: try_variant_get(data, '$.bytes', 'long')
        - name: start_epoch
          expr: try_variant_get(data, '$.start', 'long')
        - name: end_epoch
          expr: try_variant_get(data, '$.end', 'long')
        - name: action
          expr: NULLIF(try_variant_get(data, '$.action', 'string'), '-')
        - name: log_status
          expr: NULLIF(try_variant_get(data, '$.log-status', 'string'), '-')
        # -------- v3+ optional fields (NULL when not in user's column config) --------
        - name: vpc_id
          expr: NULLIF(try_variant_get(data, '$.vpc-id', 'string'), '-')
        - name: subnet_id
          expr: NULLIF(try_variant_get(data, '$.subnet-id', 'string'), '-')
        - name: instance_id
          expr: NULLIF(try_variant_get(data, '$.instance-id', 'string'), '-')
        - name: tcp_flags
          expr: try_variant_get(data, '$.tcp-flags', 'int')
        - name: flow_type
          expr: NULLIF(try_variant_get(data, '$.type', 'string'), '-')
        - name: pkt_src_addr
          expr: NULLIF(try_variant_get(data, '$.pkt-srcaddr', 'string'), '-')
        - name: pkt_dst_addr
          expr: NULLIF(try_variant_get(data, '$.pkt-dstaddr', 'string'), '-')
        - name: region
          expr: NULLIF(try_variant_get(data, '$.region', 'string'), '-')
        - name: az_id
          expr: NULLIF(try_variant_get(data, '$.az-id', 'string'), '-')
        - name: sublocation_type
          expr: NULLIF(try_variant_get(data, '$.sublocation-type', 'string'), '-')
        - name: sublocation_id
          expr: NULLIF(try_variant_get(data, '$.sublocation-id', 'string'), '-')
        - name: pkt_src_aws_service
          expr: NULLIF(try_variant_get(data, '$.pkt-src-aws-service', 'string'), '-')
        - name: pkt_dst_aws_service
          expr: NULLIF(try_variant_get(data, '$.pkt-dst-aws-service', 'string'), '-')
        - name: flow_direction
          expr: NULLIF(try_variant_get(data, '$.flow-direction', 'string'), '-')
        - name: traffic_path
          expr: try_variant_get(data, '$.traffic-path', 'int')
        # -------- v7 ECS fields --------
        - name: ecs_cluster_arn
          expr: NULLIF(try_variant_get(data, '$.ecs-cluster-arn', 'string'), '-')
        - name: ecs_cluster_name
          expr: NULLIF(try_variant_get(data, '$.ecs-cluster-name', 'string'), '-')
        - name: ecs_container_instance_arn
          expr: NULLIF(try_variant_get(data, '$.ecs-container-instance-arn', 'string'), '-')
        - name: ecs_container_instance_id
          expr: NULLIF(try_variant_get(data, '$.ecs-container-instance-id', 'string'), '-')
        - name: ecs_container_id
          expr: NULLIF(try_variant_get(data, '$.ecs-container-id', 'string'), '-')
        - name: ecs_second_container_id
          expr: NULLIF(try_variant_get(data, '$.ecs-second-container-id', 'string'), '-')
        - name: ecs_service_name
          expr: NULLIF(try_variant_get(data, '$.ecs-service-name', 'string'), '-')
        - name: ecs_task_definition_arn
          expr: NULLIF(try_variant_get(data, '$.ecs-task-definition-arn', 'string'), '-')
        - name: ecs_task_arn
          expr: NULLIF(try_variant_get(data, '$.ecs-task-arn', 'string'), '-')
        - name: ecs_task_id
          expr: NULLIF(try_variant_get(data, '$.ecs-task-id', 'string'), '-')
        # -------- v8+ fields --------
        - name: reject_reason
          expr: NULLIF(try_variant_get(data, '$.reject-reason', 'string'), '-')
        - name: resource_id
          expr: NULLIF(try_variant_get(data, '$.resource-id', 'string'), '-')
        - name: encryption_status
          expr: try_variant_get(data, '$.encryption-status', 'int')
        # -------- v5/v6 Transit Gateway fields --------
        - name: tgw_id
          expr: NULLIF(try_variant_get(data, '$.tgw-id', 'string'), '-')
        - name: tgw_attachment_id
          expr: NULLIF(try_variant_get(data, '$.tgw-attachment-id', 'string'), '-')
        - name: tgw_src_vpc_account_id
          expr: NULLIF(try_variant_get(data, '$.tgw-src-vpc-account-id', 'string'), '-')
        - name: tgw_dst_vpc_account_id
          expr: NULLIF(try_variant_get(data, '$.tgw-dst-vpc-account-id', 'string'), '-')
        - name: tgw_src_vpc_id
          expr: NULLIF(try_variant_get(data, '$.tgw-src-vpc-id', 'string'), '-')
        - name: tgw_dst_vpc_id
          expr: NULLIF(try_variant_get(data, '$.tgw-dst-vpc-id', 'string'), '-')
        - name: tgw_src_subnet_id
          expr: NULLIF(try_variant_get(data, '$.tgw-src-subnet-id', 'string'), '-')
        - name: tgw_dst_subnet_id
          expr: NULLIF(try_variant_get(data, '$.tgw-dst-subnet-id', 'string'), '-')
        - name: tgw_pair_attachment_id
          expr: NULLIF(try_variant_get(data, '$.tgw-pair-attachment-id', 'string'), '-')
        - name: resource_type
          expr: NULLIF(try_variant_get(data, '$.resource-type', 'string'), '-')
        - name: packets_lost_no_route
          expr: try_variant_get(data, '$.packets-lost-no-route', 'long')
        - name: packets_lost_blackhole
          expr: try_variant_get(data, '$.packets-lost-blackhole', 'long')
        - name: packets_lost_mtu_exceeded
          expr: try_variant_get(data, '$.packets-lost-mtu-exceeded', 'long')
        - name: packets_lost_ttl_expired
          expr: try_variant_get(data, '$.packets-lost-ttl-expired', 'long')
      utils:
        unreferencedColumns:
          preserve: true

gold:
  - name: network_activity
    input: aws_vpc_flowlogs_silver
    fields:
      # -------- Time (must be first for Delta liquid clustering) --------
      - name: time
        from: time
      # -------- Activity --------
      # VPC flow logs capture traffic flows, not connection open/close events.
      # activity_id=6 (Traffic) is correct for all flow records.
      - name: activity_id
        expr: CAST(6 AS INT)
      - name: activity_name
        literal: Traffic
      - name: activity
        literal: Traffic
      # -------- Category & Class --------
      - name: category_uid
        expr: CAST(4 AS INT)
      - name: category_name
        literal: Network Activity
      - name: class_uid
        expr: CAST(4001 AS INT)
      - name: class_name
        literal: Network Activity
      - name: type_uid
        expr: CAST(class_uid * 100 + activity_id AS BIGINT)
      - name: type_name
        expr: "concat(class_name, ': ', activity_name)"
      # -------- Severity --------
      - name: severity_id
        expr: |
          CAST(CASE
            WHEN action = 'REJECT' THEN 3
            ELSE 1
          END AS INT)
      - name: severity
        expr: |
          CASE
            WHEN severity_id = 3 THEN 'Medium'
            ELSE 'Informational'
          END
      # -------- Status --------
      - name: status_id
        expr: |
          CAST(CASE
            WHEN log_status = 'OK' THEN 1
            WHEN log_status IN ('NODATA', 'SKIPDATA') THEN 99
            ELSE 0
          END AS INT)
      - name: status
        expr: |
          CASE
            WHEN status_id = 1 THEN 'Success'
            WHEN status_id = 99 THEN 'Other'
            ELSE 'Unknown'
          END
      - name: status_code
        from: log_status
      - name: status_detail
        expr: |
          CASE
            WHEN log_status = 'OK' AND reject_reason IS NOT NULL
              THEN concat('Flow rejected: ', reject_reason)
            WHEN log_status = 'OK' THEN 'Flow log recorded'
            WHEN log_status = 'NODATA' THEN 'No data during aggregation interval'
            WHEN log_status = 'SKIPDATA' THEN 'Data skipped during aggregation interval'
            ELSE COALESCE(log_status, 'Unknown')
          END
      # -------- Action / Disposition --------
      - name: action_id
        expr: |
          CAST(CASE
            WHEN action = 'ACCEPT' THEN 1
            WHEN action = 'REJECT' THEN 2
            ELSE 0
          END AS INT)
      - name: action
        expr: |
          CASE
            WHEN action_id = 1 THEN 'Allowed'
            WHEN action_id = 2 THEN 'Denied'
            ELSE 'Unknown'
          END
      - name: disposition_id
        expr: |
          CAST(CASE
            WHEN action_id = 1 THEN 1
            WHEN action_id = 2 THEN 2
            ELSE 0
          END AS INT)
      - name: disposition
        expr: |
          CASE
            WHEN disposition_id = 1 THEN 'Allowed'
            WHEN disposition_id = 2 THEN 'Blocked'
            ELSE 'Unknown'
          END
      # -------- Source endpoint --------
      # Use packet-level IPs (v3+) when available, fall back to flow-level IPs
      - name: src_endpoint.ip
        expr: COALESCE(pkt_src_addr, src_addr)
      - name: src_endpoint.port
        from: src_port
      - name: src_endpoint.interface_uid
        from: interface_id
      - name: src_endpoint.instance_uid
        from: instance_id
      - name: src_endpoint.vpc_uid
        from: vpc_id
      - name: src_endpoint.zone
        from: az_id
      - name: src_endpoint.svc_name
        from: pkt_src_aws_service
      # -------- Destination endpoint --------
      - name: dst_endpoint.ip
        expr: COALESCE(pkt_dst_addr, dst_addr)
      - name: dst_endpoint.port
        from: dst_port
      - name: dst_endpoint.svc_name
        from: pkt_dst_aws_service
      # -------- Connection info --------
      - name: connection_info.protocol_num
        from: protocol
      - name: connection_info.protocol_name
        expr: |
          CASE
            WHEN protocol = 1  THEN 'icmp'
            WHEN protocol = 6  THEN 'tcp'
            WHEN protocol = 17 THEN 'udp'
            WHEN protocol = 47 THEN 'gre'
            WHEN protocol = 58 THEN 'icmpv6'
            ELSE NULL
          END
      - name: connection_info.direction_id
        expr: |
          CAST(CASE
            WHEN flow_direction = 'ingress' THEN 1
            WHEN flow_direction = 'egress'  THEN 2
            WHEN (src_addr RLIKE '^10\\.' OR src_addr RLIKE '^192\\.168\\.'
                  OR src_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
              AND NOT (dst_addr RLIKE '^10\\.' OR dst_addr RLIKE '^192\\.168\\.'
                       OR dst_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
            THEN 2
            WHEN NOT (src_addr RLIKE '^10\\.' OR src_addr RLIKE '^192\\.168\\.'
                      OR src_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
              AND (dst_addr RLIKE '^10\\.' OR dst_addr RLIKE '^192\\.168\\.'
                   OR dst_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
            THEN 1
            WHEN (src_addr RLIKE '^10\\.' OR src_addr RLIKE '^192\\.168\\.'
                  OR src_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
              AND (dst_addr RLIKE '^10\\.' OR dst_addr RLIKE '^192\\.168\\.'
                   OR dst_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
            THEN 3
            ELSE 0
          END AS INT)
      - name: connection_info.direction
        expr: |
          CASE
            WHEN flow_direction = 'ingress' THEN 'Inbound'
            WHEN flow_direction = 'egress'  THEN 'Outbound'
            WHEN (src_addr RLIKE '^10\\.' OR src_addr RLIKE '^192\\.168\\.'
                  OR src_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
              AND NOT (dst_addr RLIKE '^10\\.' OR dst_addr RLIKE '^192\\.168\\.'
                       OR dst_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
            THEN 'Outbound'
            WHEN NOT (src_addr RLIKE '^10\\.' OR src_addr RLIKE '^192\\.168\\.'
                      OR src_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
              AND (dst_addr RLIKE '^10\\.' OR dst_addr RLIKE '^192\\.168\\.'
                   OR dst_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
            THEN 'Inbound'
            WHEN (src_addr RLIKE '^10\\.' OR src_addr RLIKE '^192\\.168\\.'
                  OR src_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
              AND (dst_addr RLIKE '^10\\.' OR dst_addr RLIKE '^192\\.168\\.'
                   OR dst_addr RLIKE '^172\\.(1[6-9]|2[0-9]|3[0-1])\\.')
            THEN 'Lateral'
            ELSE 'Unknown'
          END
      - name: connection_info.uid
        expr: |
          SHA2(
            CONCAT_WS('|',
              COALESCE(interface_id, ''),
              COALESCE(src_addr, ''),
              COALESCE(CAST(src_port AS STRING), ''),
              COALESCE(dst_addr, ''),
              COALESCE(CAST(dst_port AS STRING), ''),
              COALESCE(CAST(protocol AS STRING), ''),
              COALESCE(CAST(start_epoch AS STRING), '')
            ), 256)
      # -------- Traffic --------
      - name: traffic.bytes
        from: bytes
      - name: traffic.packets
        from: packets
      # -------- Timing --------
      - name: start_time
        expr: TRY_TO_TIMESTAMP(start_epoch)
      - name: end_time
        expr: TRY_TO_TIMESTAMP(end_epoch)
      - name: timezone_offset
        expr: CAST(NULL AS INT)
      # -------- Cloud context --------
      - name: cloud.provider
        literal: AWS
      - name: cloud.account.uid
        from: account_id
      - name: cloud.region
        from: region
      # -------- Message --------
      - name: message
        expr: |
          CASE
            WHEN src_addr IS NULL AND dst_addr IS NULL THEN
              concat(COALESCE(log_status, 'NODATA'), ' on eni=', COALESCE(interface_id, ''))
            ELSE
              concat(
                COALESCE(action, ''), ' ',
                COALESCE(src_addr, ''), ':', COALESCE(CAST(src_port AS STRING), ''),
                ' -> ',
                COALESCE(dst_addr, ''), ':', COALESCE(CAST(dst_port AS STRING), ''),
                ' eni=', COALESCE(interface_id, ''))
          END
      # -------- Metadata --------
      - name: metadata.version
        literal: "1.7.0"
      - name: metadata.product.name
        literal: VPC Flow Logs
      - name: metadata.product.vendor_name
        literal: AWS
      - name: metadata.log_provider
        literal: aws
      - name: metadata.log_name
        literal: vpc_flowlogs
      - name: metadata.log_format
        literal: CSV
      - name: metadata.log_version
        expr: CAST(version AS STRING)
      - name: metadata.logged_time
        from: time
      - name: metadata.processed_time
        expr: CURRENT_TIMESTAMP()
      - name: metadata.uid
        from: connection_info.uid
      # -------- Observables --------
      - name: observables
        expr: |
          filter(array(
            named_struct('name', 'src_endpoint.ip',    'type', 'IP Address',   'value', COALESCE(pkt_src_addr, src_addr)),
            named_struct('name', 'dst_endpoint.ip',    'type', 'IP Address',   'value', COALESCE(pkt_dst_addr, dst_addr)),
            named_struct('name', 'src_endpoint.port',  'type', 'Port',         'value', CAST(src_port AS STRING)),
            named_struct('name', 'dst_endpoint.port',  'type', 'Port',         'value', CAST(dst_port AS STRING)),
            named_struct('name', 'cloud.account.uid',  'type', 'Account Object: uid', 'value', account_id),
            named_struct('name', 'src_endpoint.interface_uid', 'type', 'Resource UID', 'value', interface_id)
          ), x -> x.value IS NOT NULL)
      # -------- Raw data --------
      - name: raw_data
        from: data
      # -------- Unmapped --------
      - name: unmapped
        expr: |
          to_variant_object(named_struct(
            'interface_id',    interface_id,
            'subnet_id',       subnet_id,
            'tcp_flags',       tcp_flags,
            'traffic_path',    traffic_path,
            'flow_type',       flow_type,
            'sublocation_type', sublocation_type,
            'sublocation_id',  sublocation_id,
            'log_status',      log_status,
            'reject_reason',   reject_reason,
            'resource_id',     resource_id,
            'encryption_status', encryption_status,
            'tgw_id',          tgw_id,
            'tgw_attachment_id', tgw_attachment_id,
            'tgw_pair_attachment_id', tgw_pair_attachment_id,
            'resource_type',   resource_type,
            'packets_lost_no_route',    packets_lost_no_route,
            'packets_lost_blackhole',   packets_lost_blackhole,
            'packets_lost_mtu_exceeded', packets_lost_mtu_exceeded,
            'packets_lost_ttl_expired', packets_lost_ttl_expired,
            'ecs_cluster_arn', ecs_cluster_arn,
            'ecs_cluster_name', ecs_cluster_name,
            'ecs_container_instance_id', ecs_container_instance_id,
            'ecs_container_id', ecs_container_id,
            'ecs_service_name', ecs_service_name,
            'ecs_task_id',     ecs_task_id,
            'ecs_task_arn',    ecs_task_arn
          ))
