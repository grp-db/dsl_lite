# DSL Lite — Spark Declarative Pipeline (SDP) Resource
#
# Deploys dsl_lite as a Lakeflow Spark Declarative Pipeline.
# Requires Spark 4.1+ (DBR 16.0+) and Unity Catalog.
#
# The preset is controlled by the `preset_name` bundle variable:
#
#   databricks bundle deploy -t dev --var="preset_name=cisco/ios"
#   databricks bundle run dsl_lite_sdp -t dev
#
# Available preset_name values (must match a folder under pipelines/):
#   cisco/ios
#   cloudflare/gateway_dns
#   github/audit_logs
#   zeek/conn
#   aws/vpc_flowlogs
#
# The pipeline uses Unity Catalog for all table storage. Ensure the
# catalog and databases specified in the variables exist before deploying.
#
# Layer routing uses Spark conf keys — see utils.py for details:
#   dsl_lite.bronze_database_name  → bronze layer schema
#   dsl_lite.silver_database_name  → silver layer schema
#   dsl_lite.gold_catalog_name     → gold layer catalog
#   dsl_lite.gold_database_name    → gold layer schema

resources:
  pipelines:
    dsl_lite_sdp:
      name: "[${bundle.target}] DSL Lite - SDP Pipeline (${var.preset_name})"

      libraries:
        - notebook:
            path: ../src/sdp_medallion.py

      configuration:
        # Path to preset YAML — synced to workspace by DABs and accessible at this path
        dsl_lite.config_file:           "${workspace.file_path}/pipelines/${var.preset_name}/preset.yaml"

        # Layer database routing
        dsl_lite.bronze_database_name:  "${var.bronze_database}"
        dsl_lite.silver_database_name:  "${var.silver_database}"
        dsl_lite.gold_catalog_name:     "${var.catalog}"
        dsl_lite.gold_database_name:    "${var.gold_database}"

        # Set to "true" to skip a layer (use existing tables from a previous run)
        dsl_lite.skip_bronze:           "false"
        dsl_lite.skip_silver:           "false"

        # Required for Variant type support
        spark.databricks.delta.preview.enabled: "true"

      clusters:
        - label: default
          num_workers: 2
          node_type_id: ${var.node_type_id}

      # Unity Catalog integration — pipeline uses catalog/target for table creation
      catalog: ${var.catalog}
      target:  ${var.gold_database}

      # Triggered (batch) mode — set to true for continuous streaming
      continuous: false

      permissions:
        - level: CAN_VIEW
          group_name: users
