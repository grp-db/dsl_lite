# DSL Lite — GitHub Audit Logs SSS Multi-Task Job (Classic Compute)
#
#   bronze: github  (catalog: use 'catalog.database' format in the database variable, e.g. cisco_database: "cyber_lakehouse.cisco")
#   silver: github
#   gold:   ocsf

resources:
  jobs:
    github_audit_logs_sss:
      name: "[${bundle.target}] DSL Lite - GitHub Audit Logs (SSS)"

      job_clusters:
        - job_cluster_key: pipeline_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id:  ${var.node_type_id}
            num_workers: 2

      tasks:

        - task_key: bronze
          description: "Ingest GitHub Audit Logs into the Bronze Delta table via Auto Loader."
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../../src/sss_bronze.py
            base_parameters:
              preset_file:          "${workspace.file_path}/pipelines/github/audit_logs/preset.yaml"
              bronze_database:      "${var.github_database}"
              checkpoints_location: "${var.sss_checkpoints_base}/github_audit_logs"
              continuous:           "False"

        - task_key: silver
          description: "Parse and structure Bronze data into the Silver Delta table."
          depends_on:
            - task_key: bronze
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../../src/sss_silver.py
            base_parameters:
              preset_file:          "${workspace.file_path}/pipelines/github/audit_logs/preset.yaml"
              bronze_database:      "${var.github_database}"
              silver_database:      "${var.github_database}"
              checkpoints_location: "${var.sss_checkpoints_base}/github_audit_logs"
              continuous:           "False"

        - task_key: gold
          description: "Map Silver data to OCSF-compliant Gold tables (IAM event categories)."
          depends_on:
            - task_key: silver
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../../src/sss_gold.py
            base_parameters:
              preset_file:          "${workspace.file_path}/pipelines/github/audit_logs/preset.yaml"
              silver_database:      "${var.github_database}"
              gold_database:        "${var.gold_database}"
              checkpoints_location: "${var.sss_checkpoints_base}/github_audit_logs"
              continuous:           "False"

      permissions:
        - level: CAN_VIEW
          group_name: users
