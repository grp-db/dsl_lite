# DSL Lite — GitHub Audit Logs SSS Multi-Task Job (Serverless)

resources:
  jobs:
    github_audit_logs_pipeline:
      name: "[${bundle.target}] DSL Lite - GitHub Audit Logs Pipeline"

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:

        - task_key: bronze
          description: "Ingest GitHub Audit Logs into the Bronze Delta table via Auto Loader."
          environment_key: default
          notebook_task:
            notebook_path: ../../src/sss_bronze.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/github/audit_logs/preset.yaml"
              bronze_database:       "${var.bronze_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/github_audit_logs"
              continuous:            "False"

        - task_key: silver
          description: "Parse and structure Bronze data into the Silver Delta table."
          depends_on:
            - task_key: bronze
          environment_key: default
          notebook_task:
            notebook_path: ../../src/sss_silver.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/github/audit_logs/preset.yaml"
              bronze_database:       "${var.bronze_database}"
              silver_database:       "${var.silver_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/github_audit_logs"
              continuous:            "False"

        - task_key: gold
          description: "Map Silver data to OCSF-compliant Gold tables (IAM event categories)."
          depends_on:
            - task_key: silver
          environment_key: default
          notebook_task:
            notebook_path: ../../src/sss_gold.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/github/audit_logs/preset.yaml"
              silver_database:       "${var.silver_database}"
              gold_database:         "${var.gold_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/github_audit_logs"
              continuous:            "False"

      permissions:
        - level: CAN_VIEW
          group_name: users
