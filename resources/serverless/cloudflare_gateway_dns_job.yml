# DSL Lite — Cloudflare Gateway DNS SSS Multi-Task Job (Serverless)

resources:
  jobs:
    cloudflare_gateway_dns_pipeline:
      name: "[${bundle.target}] DSL Lite - Cloudflare Gateway DNS Pipeline"

      environments:
        - environment_key: default
          spec:
            client: "1"

      tasks:

        - task_key: bronze
          description: "Ingest Cloudflare Gateway DNS logs into the Bronze Delta table via Auto Loader."
          environment_key: default
          notebook_task:
            notebook_path: ../../src/sss_bronze.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/cloudflare/gateway_dns/preset.yaml"
              bronze_database:       "${var.bronze_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/cloudflare_gateway_dns"
              continuous:            "False"

        - task_key: silver
          description: "Parse and structure Bronze data into the Silver Delta table."
          depends_on:
            - task_key: bronze
          environment_key: default
          notebook_task:
            notebook_path: ../../src/sss_silver.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/cloudflare/gateway_dns/preset.yaml"
              bronze_database:       "${var.bronze_database}"
              silver_database:       "${var.silver_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/cloudflare_gateway_dns"
              continuous:            "False"

        - task_key: gold
          description: "Map Silver data to OCSF-compliant Gold tables (dns_activity)."
          depends_on:
            - task_key: silver
          environment_key: default
          notebook_task:
            notebook_path: ../../src/sss_gold.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/cloudflare/gateway_dns/preset.yaml"
              silver_database:       "${var.silver_database}"
              gold_database:         "${var.gold_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/cloudflare_gateway_dns"
              continuous:            "False"

      permissions:
        - level: CAN_VIEW
          group_name: users
