# DSL Lite — AWS VPC Flow Logs SSS Multi-Task Job
#
# Processes AWS VPC Flow Logs through Bronze → Silver → Gold.
# Produces network_activity OCSF tables in the Gold layer.

resources:
  jobs:
    aws_vpc_flowlogs_pipeline:
      name: "[${bundle.target}] DSL Lite - AWS VPC Flow Logs Pipeline"

      job_clusters:
        - job_cluster_key: pipeline_cluster
          new_cluster:
            spark_version: ${var.spark_version}
            node_type_id: ${var.node_type_id}
            num_workers: 2
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"

      tasks:

        - task_key: bronze
          description: "Ingest AWS VPC Flow Logs into the Bronze Delta table via Auto Loader."
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../../src/sss_bronze.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/aws/vpc_flowlogs/preset.yaml"
              bronze_database:       "${var.bronze_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/aws_vpc_flowlogs"
              continuous:            "False"

        - task_key: silver
          description: "Parse and structure Bronze data into the Silver Delta table."
          depends_on:
            - task_key: bronze
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../../src/sss_silver.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/aws/vpc_flowlogs/preset.yaml"
              bronze_database:       "${var.bronze_database}"
              silver_database:       "${var.silver_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/aws_vpc_flowlogs"
              continuous:            "False"

        - task_key: gold
          description: "Map Silver data to OCSF-compliant Gold tables (network_activity)."
          depends_on:
            - task_key: silver
          job_cluster_key: pipeline_cluster
          notebook_task:
            notebook_path: ../../src/sss_gold.py
            base_parameters:
              preset_file:           "${workspace.file_path}/pipelines/aws/vpc_flowlogs/preset.yaml"
              silver_database:       "${var.silver_database}"
              gold_database:         "${var.gold_database}"
              checkpoints_location:  "${var.sss_checkpoints_base}/aws_vpc_flowlogs"
              continuous:            "False"

      permissions:
        - level: CAN_VIEW
          group_name: users
