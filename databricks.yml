# DSL Lite — Databricks Asset Bundle
#
# Deploys DSL Lite cybersecurity data pipelines to Databricks.
# Supports three execution modes:
#   - SSS Multi-Task Job (recommended): Bronze → Silver → Gold as separate tasks
#   - SSS Single-Task Job: All layers in one notebook (resources/sss_medallion_job.yml)
#   - SDP Pipeline:        Spark Declarative Pipeline via Lakeflow (resources/sdp_pipeline.yml)
#
# Quick start:
#   databricks bundle validate
#   databricks bundle deploy -t dev
#   databricks bundle run cisco_ios_pipeline -t dev

bundle:
  name: dsl_lite

# Sync all source notebooks and preset YAML files to the workspace.
# After deployment, preset files are accessible from notebooks at:
#   ${workspace.file_path}/pipelines/<vendor>/<type>/preset.yaml
sync:
  include:
    - "src/**"
    - "pipelines/**"

# ── Compute mode ─────────────────────────────────────────────────────────────
# Uncomment ONE block below to select the compute type for SSS jobs.
# The SDP pipeline (resources/sdp_pipeline.yml) is always included and runs
# serverless by default when no cluster config is specified.
#
# Option 1: Serverless (recommended — no cluster management, ignores
#           spark_version and node_type_id variables)
include:
  - resources/*.yml
  - resources/serverless/*.yml
#
# Option 2: Classic compute (uses spark_version and node_type_id variables)
# include:
#   - resources/*.yml
#   - resources/classic/*.yml
# ─────────────────────────────────────────────────────────────────────────────

variables:

  # --- Catalog / Database ---
  # PLACEHOLDER: Replace these defaults with your actual catalog and schema names.
  # The per-target overrides in the `targets` section below take precedence —
  # these root-level defaults are only used if no target override is set.

  catalog:
    description: "Unity Catalog catalog name used for Gold (OCSF) tables and SDP pipeline target."
    default: "main"   # placeholder — "main" is the default UC catalog but may differ in your workspace

  bronze_database:
    description: "Schema/database name for Bronze layer tables."
    default: "dsl_bronze"   # placeholder

  silver_database:
    description: "Schema/database name for Silver layer tables."
    default: "dsl_silver"   # placeholder

  gold_database:
    description: "Schema/database name for Gold (OCSF) layer tables."
    default: "dsl_gold"   # placeholder

  # --- Checkpoints (SSS only) ---
  # SDP pipelines manage checkpoints internally — this variable is not used by sdp_pipeline.yml.
  # PLACEHOLDER: Set to a Volume or DBFS path that exists in your workspace.

  sss_checkpoints_base:
    description: >
      Base path for Spark Structured Streaming (SSS) checkpoints only.
      Not used by SDP pipelines (Lakeflow manages those internally).
      Each SSS pipeline appends its own subdirectory (e.g. /cisco_ios).
      Supports DBFS (/dbfs/...) and Volume (/Volumes/...) paths.
    default: "/Volumes/main/dsl_bronze/checkpoints"   # placeholder — update to match your catalog/schema

  # --- Cluster (classic compute only) ---
  # These variables are only used by resources/classic/*.yml.
  # They are ignored when using serverless compute (resources/serverless/*.yml).

  spark_version:
    description: "Databricks Runtime version for classic job clusters."
    default: "16.4.x-scala2.12"   # classic compute only — update to match your workspace's available runtimes

  node_type_id:
    description: "Worker node instance type for classic job clusters."
    default: "i3.xlarge"   # placeholder — AWS only; use Standard_D4ds_v5 (Azure) or n2-highmem-4 (GCP)

  # --- SDP / Single-Task Generic ---

  preset_name:
    description: >
      Preset sub-path used by the generic SDP pipeline and SSS single-task job.
      Must match a folder under pipelines/ (e.g. cisco/ios, cloudflare/gateway_dns).
    default: "cisco/ios"   # placeholder — change to the preset you want to deploy

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------

targets:

  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      catalog: "dev"
      bronze_database: "dsl_bronze_dev"
      silver_database: "dsl_silver_dev"
      gold_database: "dsl_gold_dev"
      sss_checkpoints_base: "/Volumes/dev/dsl_bronze_dev/checkpoints"

  staging:
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      catalog: "staging"
      bronze_database: "dsl_bronze_staging"
      silver_database: "dsl_silver_staging"
      gold_database: "dsl_gold_staging"
      sss_checkpoints_base: "/Volumes/staging/dsl_bronze_staging/checkpoints"

  prod:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      catalog: "prod"
      bronze_database: "dsl_bronze"
      silver_database: "dsl_silver"
      gold_database: "dsl_gold"
      sss_checkpoints_base: "/Volumes/prod/dsl_bronze/checkpoints"
