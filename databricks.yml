# DSL Lite — Databricks Asset Bundle
#
# Deploys DSL Lite cybersecurity data pipelines to Databricks.
# Supports two execution modes:
#   - SDP (recommended): Lakeflow Spark Declarative Pipeline, always serverless
#   - SSS:               Spark Structured Streaming, classic compute
#
# Quick start:
#   databricks bundle validate -t dev
#   databricks bundle deploy -t dev
#   databricks bundle run cisco_ios_sdp -t dev

bundle:
  name: dsl_lite

# Sync source notebooks and preset YAML files to the workspace.
# After deployment, preset files are accessible from notebooks at:
#   ${workspace.file_path}/pipelines/<vendor>/<type>/preset.yaml
sync:
  include:
    - "src/**"
    - "pipelines/**"

# ── Execution mode ────────────────────────────────────────────────────────────
# Uncomment ONE block to select the execution mode.
#
# Option 1: SDP — Lakeflow Spark Declarative Pipelines (recommended, serverless)
include:
  - resources/sdp/*.yml
#
# Option 2: SSS — Spark Structured Streaming, classic compute
# include:
#   - resources/sss/*.yml
# ─────────────────────────────────────────────────────────────────────────────

variables:

  # --- Per-layer catalog ---
  # These can differ per layer and per customer environment.
  # Leave a catalog empty ("") to use only the database name (no catalog prefix).
  # SDP supports full per-layer catalog routing via Spark conf.
  # SSS notebooks accept database only — use the preset YAML for per-table catalog overrides.

  bronze_catalog:
    description: >
      Catalog for Bronze layer tables.
      SDP: passed as dsl_lite.bronze_catalog_name Spark conf key.
      SSS: include the catalog in the pipeline database variable instead
           (e.g. set cisco_database to "cyber_lakehouse.cisco").
      Leave empty to omit catalog prefix and use database name only.
    default: ""   # placeholder — e.g. "cyber_lakehouse"

  silver_catalog:
    description: >
      Catalog for Silver layer tables.
      SDP: passed as dsl_lite.silver_catalog_name Spark conf key.
      SSS: include the catalog in the pipeline database variable instead.
      Leave empty to omit catalog prefix and use database name only.
    default: ""   # placeholder — e.g. "cyber_lakehouse"

  gold_catalog:
    description: >
      Catalog for Gold (OCSF) layer tables.
      SDP: passed as dsl_lite.gold_catalog_name Spark conf key.
      SSS: include the catalog in the gold_database variable instead
           (e.g. set gold_database to "cyber_lakehouse.ocsf").
      Leave empty to omit catalog prefix and use database name only.
    default: ""   # placeholder — e.g. "cyber_lakehouse"

  # --- Per-pipeline databases ---
  # SDP: these are passed as dsl_lite.{level}_database_name Spark conf keys.
  # SSS: these are passed directly as notebook widget parameters.
  #      To include a catalog in SSS, use "catalog.database" format here
  #      (e.g. cisco_database: "cyber_lakehouse.cisco") since SSS notebooks
  #      do not accept a separate catalog parameter.

  cisco_database:
    description: "Bronze and Silver schema for the Cisco IOS pipeline. Use 'catalog.schema' format to include a catalog in SSS mode."
    default: "cisco"

  cloudflare_database:
    description: "Bronze and Silver schema for the Cloudflare Gateway DNS pipeline. Use 'catalog.schema' format to include a catalog in SSS mode."
    default: "cloudflare"

  github_database:
    description: "Bronze and Silver schema for the GitHub Audit Logs pipeline. Use 'catalog.schema' format to include a catalog in SSS mode."
    default: "github"

  zeek_database:
    description: "Bronze and Silver schema for the Zeek Conn pipeline. Use 'catalog.schema' format to include a catalog in SSS mode."
    default: "zeek"

  aws_database:
    description: "Bronze and Silver schema for the AWS VPC Flow Logs pipeline. Use 'catalog.schema' format to include a catalog in SSS mode."
    default: "aws"

  gold_database:
    description: "Gold (OCSF) schema shared across all pipelines. Use 'catalog.schema' format to include a catalog in SSS mode."
    default: "ocsf"

  # --- Checkpoints (SSS only) ---
  # SDP manages checkpoints internally — this variable is not used by resources/sdp/*.yml.

  sss_checkpoints_base:
    description: >
      Base path for SSS checkpoints. Each pipeline appends its own subdirectory.
      Supports DBFS (/dbfs/...) and Volume (/Volumes/...) paths.
      Not used by SDP pipelines.
    default: "/Volumes/main/ocsf/checkpoints"   # placeholder

  # --- Classic compute (SSS only) ---
  # Ignored when using SDP mode.

  spark_version:
    description: "Databricks Runtime version for SSS classic job clusters."
    default: "16.4.x-scala2.12"   # update to match your workspace's available runtimes

  node_type_id:
    description: "Worker node instance type for SSS classic job clusters."
    default: "i3.xlarge"   # AWS — use Standard_D4ds_v5 (Azure) or n2-highmem-4 (GCP)

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------

targets:

  dev:
    default: true
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog:   ""
      sss_checkpoints_base: "/Volumes/main/ocsf/checkpoints"   # placeholder

  staging:
    mode: development
    workspace:
      profile: DEFAULT
    variables:
      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog:   ""
      sss_checkpoints_base: "/Volumes/main/ocsf/checkpoints"   # placeholder

  prod:
    mode: production
    workspace:
      profile: DEFAULT
    variables:
      bronze_catalog: ""
      silver_catalog: ""
      gold_catalog:   ""
      sss_checkpoints_base: "/Volumes/main/ocsf/checkpoints"   # placeholder
